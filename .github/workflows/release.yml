name: Publish release

on:
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and attest distributions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Checkout the tagged revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require the tagged commit to be on main
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "Release tags must point to a commit reachable from main." >&2
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.28"
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.13

      - name: Build wheel and source distribution once
        run: uv build --python 3.13 --no-sources --clear --no-create-gitignore

      - name: Validate distribution metadata
        run: uvx --from 'twine==6.2.0' twine check --strict dist/*

      - name: Verify tag, artifact set, and checksums
        shell: bash
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)
          if (( ${#wheels[@]} != 1 || ${#sdists[@]} != 1 )); then
            echo "Expected exactly one wheel and one source distribution." >&2
            exit 1
          fi
          TAG_VERSION="${TAG_VERSION#v}" uv run --no-project --python 3.13 python - <<'PY'
          import email
          import os
          import pathlib
          import zipfile

          wheel = next(pathlib.Path("dist").glob("*.whl"))
          with zipfile.ZipFile(wheel) as archive:
              metadata_name = next(name for name in archive.namelist() if name.endswith(".dist-info/METADATA"))
              metadata = email.message_from_bytes(archive.read(metadata_name))

          package_version = metadata["Version"]
          tag_version = os.environ["TAG_VERSION"]
          if package_version != tag_version:
              raise SystemExit(
                  f"Tag v{tag_version} does not match built package version {package_version}"
              )
          print(f"Release tag matches package version {package_version}")
          PY
          (cd dist && sha256sum * > ../SHA256SUMS)

      - name: Smoke-test the exact wheel offline
        shell: bash
        run: |
          uv export --frozen --no-dev --no-emit-project --output-file runtime-requirements.txt
          uv venv --python 3.13 .wheel-smoke
          uv pip install \
            --python .wheel-smoke/bin/python \
            --require-hashes \
            --requirement runtime-requirements.txt
          uv pip install \
            --offline \
            --no-index \
            --no-deps \
            --python .wheel-smoke/bin/python \
            dist/*.whl
          .wheel-smoke/bin/python -I - <<'PY'
          from importlib.metadata import version

          from agentease import AgentEase, __version__

          assert __version__ == version("agentease")
          client = AgentEase.offline()
          assert client.triage.run("Customer was charged twice.").category == "billing"
          assert client.lead_qualification.run("Enterprise buyer wants a demo.").intent == "hot"
          assert client.document_classification.run("Internal policy.").doc_type == "policy"
          print(f"agentease {__version__} imports and all offline workflows run")
          PY

      - name: Attest distribution provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: dist/*

      - name: Upload the exact release bundle
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: release-distributions
          path: |
            dist/
            SHA256SUMS
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  publish-pypi:
    name: Publish exact bundle to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # This repository has one maintainer, so the environment requires approval
    # from ejames-dev while allowing self-review. Configure the matching PyPI
    # Trusted Publisher before the first release.
    environment:
      name: pypi
      url: https://pypi.org/p/agentease
    permissions:
      id-token: write

    steps:
      - name: Download the attested release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: release-bundle

      - name: Verify downloaded checksums
        working-directory: release-bundle/dist
        run: sha256sum --check ../SHA256SUMS

      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@ec4db0b4ddc65acdf4bff5fa45ac92d78b56bdf0 # v1.9.0
        with:
          packages-dir: release-bundle/dist
          verify-metadata: true
          skip-existing: false
          print-hash: true

  github-release:
    name: Create GitHub release from exact bundle
    needs: publish-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download the published release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions
          path: release-bundle

      - name: Verify downloaded checksums
        working-directory: release-bundle/dist
        run: sha256sum --check ../SHA256SUMS

      - name: Create release for the existing tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          release-bundle/dist/*
          release-bundle/SHA256SUMS
          --repo "${{ github.repository }}"
          --verify-tag
          --generate-notes
          --title "AgentEase ${{ github.ref_name }}"
