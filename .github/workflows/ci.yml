name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --dev --python ${{ matrix.python-version }}

      - name: Check formatting
        run: uv run --frozen ruff format --check .

      - name: Lint
        run: uv run --frozen ruff check .

      - name: Run tests
        run: uv run --frozen pytest

  package:
    name: Build and inspect distributions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.13

      - name: Run documented offline examples
        run: |
          uv run --frozen --python 3.13 python examples/support_triage.py
          uv run --frozen --python 3.13 python examples/lead_qualification.py
          uv run --frozen --python 3.13 python examples/document_classification.py
          uv run --frozen --python 3.13 python examples/batch_triage_jsonl.py

      - name: Build wheel and source distribution
        run: uv build --python 3.13 --no-sources --clear --no-create-gitignore

      - name: Validate distribution metadata
        run: uvx --from 'twine==6.2.0' twine check --strict dist/*

      - name: Smoke-test the wheel in an isolated environment
        shell: bash
        run: |
          uv export --frozen --no-dev --no-emit-project --output-file runtime-requirements.txt
          uv venv --python 3.13 .wheel-smoke
          uv pip install \
            --python .wheel-smoke/bin/python \
            --require-hashes \
            --requirement runtime-requirements.txt
          uv pip install \
            --offline \
            --no-index \
            --no-deps \
            --python .wheel-smoke/bin/python \
            dist/*.whl
          .wheel-smoke/bin/python -I - <<'PY'
          from importlib.metadata import version

          from agentease import AgentEase, __version__

          assert __version__ == version("agentease")
          client = AgentEase.offline()
          assert client.triage.run("Customer was charged twice.").category == "billing"
          assert client.lead_qualification.run("Enterprise buyer wants a demo.").intent == "hot"
          assert client.document_classification.run("Internal policy.").doc_type == "policy"
          print(f"agentease {__version__} imports and all offline workflows run")
          PY
