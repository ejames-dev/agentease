name: Bug report
description: Report a reproducible problem in AgentEase
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets or real customer data.
        Suspected vulnerabilities must be reported privately through the Security tab.
  - type: input
    id: version
    attributes:
      label: AgentEase version
      description: Run `uv run python -c "import agentease; print(agentease.__version__)"` if needed.
      placeholder: 0.2.0
    validations:
      required: true
  - type: dropdown
    id: python-version
    attributes:
      label: Python version
      options:
        - "3.11"
        - "3.12"
        - "3.13"
        - Other or unsupported
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the actual behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest example using synthetic or redacted data.
      render: python
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Include your operating system, provider, and model when relevant.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and pull requests for this problem.
          required: true
        - label: This report contains no secrets or real customer data.
          required: true
        - label: This is not a vulnerability disclosure.
          required: true
